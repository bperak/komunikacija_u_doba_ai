<text x="141.8" y="210" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">Poredak i legitimizacija</text>
<text x="347.95000000000005" y="210" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">Estetska funkcija</text>
</svg>