<text x="131.075" y="58" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">ELIZA 1966</text>
<text x="131.075" y="134" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">Prepoznavanje uzoraka</text>
<text x="319.34999999999997" y="210" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">Daljnji razvoj dijaloških agenata i NLP-a</text>
<text x="319.34999999999997" y="58" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">PARRY 1972</text>
