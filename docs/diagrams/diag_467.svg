<text x="591.0500000000001" y="58" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">Tisak s pomičnim slovima (Gutenberg)</text>
<text x="591.0500000000001" y="134" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">Masovna proizvodnja i dostupnost knjiga</text>
<text x="441.5000000000001" y="210" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">Demokratizacija znanja i masovno širenje ideja</text>
<text x="740.6000000000001" y="210" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">Standardizacija jezika</text>
<text x="252.62500000000006" y="286" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">&quot;Širenje znanstvenih radova (Kopernik, Newton) i vje...</text>
<text x="630.375" y="286" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">Pojava novih formi: novine i romani</text>
</svg>