<text x="284.8" y="197.5" text-anchor="middle" dy="0.35em" font-size="11" font-weight="400" fill="var(--_text-muted)">primjena</text>
<rect x="749.6450000000001" y="184" width="61.760000000000005" height="27" rx="4" ry="4" fill="var(--bg)" stroke="var(--_inner-stroke)" stroke-width="0.5" />
<text x="780.5250000000001" y="197.5" text-anchor="middle" dy="0.35em" font-size="11" font-weight="400" fill="var(--_text-muted)">primjena</text>
<rect x="395.1125" y="40" width="275.1" height="36" rx="0" ry="0" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
<rect x="287.8625" y="133" width="489.6" height="36" rx="0" ry="0" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
<rect x="40" y="226" width="489.6" height="36" rx="0" ry="0" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
<rect x="553.6000000000001" y="226" width="453.85" height="36" rx="0" ry="0" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
<rect x="514.2750000000001" y="302" width="532.5" height="36" rx="0" ry="0" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="0.75" />
<text x="532.6625" y="58" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">Golemi korpus tekstualnih podataka</text>
<text x="532.6625" y="151" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">Apstraktne unutarnje reprezentacije: koncepti, odnosi, uzročnost</text>
<text x="284.8" y="244" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">Generalizacija unutar distribucije: zadaci slični podacima obuke</text>
<text x="780.5250000000001" y="244" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">Generalizacija izvan distribucije: novi zadaci, nove domene</text>
<text x="780.5250000000001" y="320" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">Emergentne sposobnosti: analogijsko zaključivanje, few-shot, zero-shot</text>
</svg>