<text x="240.27499999999998" y="266" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">Posredna komunikacija Stigmergija</text>
<text x="240.27499999999998" y="326" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">Suradnja</text>
