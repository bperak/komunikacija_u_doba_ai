<rect x="40" y="360" width="400.54999999999995" height="28" rx="0" ry="0" fill="var(--_group-hdr)" stroke="var(--_node-stroke)" stroke-width="1" />
<text x="52" y="374" dy="0.35em" font-size="12" font-weight="600" fill="var(--_text-sec)">Kolektivna Svojstva</text>
<polyline points="240.27499999999998,196 240.27499999999998,236" fill="none" stroke="var(--_line)" stroke-width="0.75" marker-end="url(#arrowhead)" />
