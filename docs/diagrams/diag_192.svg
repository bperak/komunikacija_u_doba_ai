<text x="677.2499999999999" y="54" dy="0.35em" font-size="12" font-weight="600" fill="var(--_text-sec)">LLM paradigma</text>
<polyline points="230.9999999999999,106 270.9999999999999,106" fill="none" stroke="var(--_line)" stroke-width="0.75" marker-end="url(#arrowhead)" />
<polyline points="417.39999999999986,106 457.39999999999986,106" fill="none" stroke="var(--_line)" stroke-width="0.75" marker-end="url(#arrowhead)" />
<polyline points="920.5999999999999,106 960.5999999999999,106" fill="none" stroke="var(--_line)" stroke-width="0.75" marker-end="url(#arrowhead)" />
<polyline points="1199.9499999999998,106 1362.35,106" fill="none" stroke="var(--_line)" stroke-width="0.75" marker-end="url(#arrowhead)" />
<rect x="1215.95" y="92.5" width="130.4" height="27" rx="4" ry="4" fill="var(--bg)" stroke="var(--_inner-stroke)" stroke-width="0.5" />
<text x="1281.15" y="106" text-anchor="middle" dy="0.35em" font-size="11" font-weight="400" fill="var(--_text-muted)">Utjecaj / Djelovanje</text>
