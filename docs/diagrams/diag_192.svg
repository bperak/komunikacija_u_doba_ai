<text x="541.3249999999998" y="106" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">Simbol / Označitelj</text>
<text x="800.925" y="106" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">Statistički obrasci u korpusu</text>
<text x="1080.2749999999999" y="106" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">Generirani označitelj / Tekst</text>
