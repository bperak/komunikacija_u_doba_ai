<text x="191.85000000000002" y="58" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">Sirova stvarnost, događaji i činjenice</text>
<text x="328.88750000000005" y="151" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">Algoritamska leća: model, parametri, korpus</text>
