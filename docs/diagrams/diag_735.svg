<text x="245.47500000000002" y="58" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">Korisnička potvrda</text>
<text x="245.47500000000002" y="134" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">Agentov plan: 1. Rezervirati let 2. Rezervirati hotel</text>
