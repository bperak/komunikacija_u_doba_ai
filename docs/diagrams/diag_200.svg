<text x="202.57500000000002" y="210" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">Generiranje pristranih odluka/predviđanja</text>
<text x="202.57500000000002" y="286" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">Društveni ishodi pojačavaju nejednakost</text>
