<text x="191.85000000000002" y="134" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">Simbolička reprezentacija</text>
<text x="191.85000000000002" y="210" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">Jezična struktura, gramatika i pravila</text>
