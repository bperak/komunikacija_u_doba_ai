<text x="227.60000000000002" y="134" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">Ukidanje nužnosti fizičke prisutnosti</text>
<text x="227.60000000000002" y="210" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">Intimna komunikacija na daljinu</text>
<text x="227.60000000000002" y="286" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">Privatna i javna sfera</text>
