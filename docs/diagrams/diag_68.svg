<text x="348.46250000000003" y="182" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">Simultano gledanje milijuni pojedinaca</text>
<text x="189.97500000000002" y="258" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">Sinkronizacija vremena i prostora</text>
