<text x="491.4625000000001" y="106" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">ELIZA (1966) Prepoznavanje uzoraka i transformacija...</text>
<text x="268.625" y="182" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">PARRY (1972) Simulacija s unutarnjim afektivnim stanjem</text>
<text x="714.3000000000001" y="182" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">SHRDLU (1972) Sinteza jezika i logike u ograničenom...</text>
<text x="491.4625000000001" y="258" text-anchor="middle" dy="0.35em" font-size="13" font-weight="500" fill="var(--_text)">Daljnji razvoj dijaloških agenata i NLP-a</text>
