# Pri svakom pushu na main: ažurira release "latest" s PDF i HTML iz repozitorija.
# Kad kažeš "ovo je izdanje 2", ručno kreiraj novi Release (npr. v2.0.0) — "latest" ostaje za zadnji push.
name: Release latest (zadnji push)

on:
  push:
    branches: [main]
    paths:
      - 'manuscript/Perak_Komunikacija_u_doba_AI.pdf'
      - 'manuscript/Perak_Komunikacija_u_doba_AI.html'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Delete existing release and tag 'latest'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO="${{ github.repository }}"
          # Get release id for tag 'latest' (if any)
          RELEASE_ID=$(curl -s -H "Authorization: token $GH_TOKEN" "https://api.github.com/repos/$REPO/releases/tags/latest" | jq -r '.id // empty')
          if [ -n "$RELEASE_ID" ]; then
            curl -s -X DELETE -H "Authorization: token $GH_TOKEN" "https://api.github.com/repos/$REPO/releases/$RELEASE_ID"
          fi
          # Delete tag 'latest'
          curl -s -X DELETE -H "Authorization: token $GH_TOKEN" "https://api.github.com/repos/$REPO/git/refs/tags/latest" || true

      - name: Create tag 'latest'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO="${{ github.repository }}"
          SHA="${{ github.sha }}"
          curl -s -X POST -H "Authorization: token $GH_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"ref\":\"refs/tags/latest\",\"sha\":\"$SHA\"}" \
            "https://api.github.com/repos/$REPO/git/refs"

      - name: Create release 'latest' and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Zadnji build (latest)
          body: |
            **Automatski** ažurirano pri pushu na `main` (PDF/HTML). To je *zadnji snapshot* iz repozitorija, ne službeni broj izdanja.

            **Službeno izdanje** (izdavač): Filozofski fakultet, Rijeka — stranica FFRI kad je objavljena.

            **Novo izdanje knjige na GitHubu** (npr. kad izađe novo izdanje na FFRI): napravi poseban Release s tagom `v1.0.0`, `v1.1.0`, `v2.0.0` … — vidi [docs/IZDANJE_GITHUB.md](https://github.com/bperak/komunikacija_u_doba_ai/blob/main/docs/IZDANJE_GITHUB.md).
          files: |
            manuscript/Perak_Komunikacija_u_doba_AI.pdf
            manuscript/Perak_Komunikacija_u_doba_AI.html
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
